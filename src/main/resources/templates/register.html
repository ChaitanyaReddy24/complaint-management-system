<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: header('Customer Registration')}">
</head>

<body>

<div class="container">

    <div class="row justify-content-center align-items-center"
         style="min-height:100vh;">

        <div class="col-md-6 col-lg-5">

            <div class="card shadow">

                <div class="card-body p-4">

                    <div class="text-center mb-4">

                        <h2 class="fw-bold text-primary">
                            Customer Registration
                        </h2>

                        <p class="text-muted">
                            Create your CMS account
                        </p>

                    </div>

                    <form th:action="@{/register}"
                          th:object="${user}"
                          method="post">

                        <!-- Name -->

                        <div class="mb-3">

                            <label class="form-label">
                                Full Name
                            </label>

                            <input type="text"
                                   th:field="*{name}"
                                   class="form-control"
                                   placeholder="Enter Full Name">

                            <small class="text-danger"
                                   th:if="${#fields.hasErrors('name')}"
                                   th:errors="*{name}">
                            </small>

                        </div>

                        <!-- Email -->

                        <div class="mb-3">

                            <label class="form-label">
                                Email
                            </label>

                            <input type="email"
                                   th:field="*{email}"
                                   class="form-control"
                                   placeholder="Enter Email">

                            <small class="text-danger"
                                   th:if="${#fields.hasErrors('email')}"
                                   th:errors="*{email}">
                            </small>

                        </div>

                        <!-- Mobile -->

                        <div class="mb-3">

                            <label class="form-label">
                                Mobile Number
                            </label>

                            <input type="text"
                                   th:field="*{mobile}"
                                   class="form-control"
                                   placeholder="Enter Mobile Number">

                            <small class="text-danger"
                                   th:if="${#fields.hasErrors('mobile')}"
                                   th:errors="*{mobile}">
                            </small>

                        </div>

                        <!-- Password -->

                        <div class="mb-3">

                            <label class="form-label">
                                Password
                            </label>

                            <input type="password"
                                   th:field="*{password}"
                                   class="form-control"
                                   placeholder="Enter Password">

                            <small class="text-danger"
                                   th:if="${#fields.hasErrors('password')}"
                                   th:errors="*{password}">
                            </small>

                        </div>

                        <!-- Hidden Role -->

                        <input type="hidden"
                               th:field="*{role}">

                        <div class="d-grid">

                            <button type="submit"
                                    class="btn btn-primary">

                                Register

                            </button>

                        </div>

                    </form>

                    <hr>

                    <div class="text-center">

                        <span class="text-muted">
                            Already have an account?
                        </span>

                        <a th:href="@{/login}"
                           class="fw-bold text-decoration-none">

                            Login Here

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
