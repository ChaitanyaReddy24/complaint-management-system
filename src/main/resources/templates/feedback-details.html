<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: header('Feedback Details')}">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar(true)}">
</div>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2 class="page-title mb-0">
            Feedback Details
        </h2>

        <a th:href="@{/admin/feedbacks}"
           class="btn btn-secondary">

            Back to Feedbacks

        </a>

    </div>

    <div class="card shadow-sm">

        <div class="card-header">

            <h5 class="mb-0">
                Feedback Information
            </h5>

        </div>

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-bordered align-middle">

                    <tr>
                        <th width="30%">Feedback ID</th>
                        <td th:text="${feedback.feedbackId}">
                        </td>
                    </tr>

                    <tr>
                        <th>Complaint</th>
                        <td th:text="${feedback.complaint.title}">
                        </td>
                    </tr>

                    <tr>
                        <th>Customer</th>
                        <td th:text="${feedback.complaint.customer.name}">
                        </td>
                    </tr>

                    <tr>
                        <th>Rating</th>

                        <td>

                            <span class="badge bg-warning text-dark fs-6">

                                <span th:text="${feedback.rating}">
                                </span>/5

                            </span>

                        </td>

                    </tr>

                    <tr>
                        <th>Comments</th>

                        <td th:text="${feedback.comments}">
                        </td>

                    </tr>

                    <tr>
                        <th>Feedback Date</th>

                        <td th:text="${feedback.feedbackDate}">
                        </td>

                    </tr>

                </table>

            </div>

            <div class="mt-3">

                <a th:href="@{/admin/feedbacks}"
                   class="btn btn-outline-secondary">

                    Back

                </a>

            </div>

        </div>

    </div>

</div>

<div th:replace="~{fragments/footer :: footer}">
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
