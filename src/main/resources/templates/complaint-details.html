
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: header('Complaint Details')}">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar(true)}">
</div>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2 class="page-title mb-0">
            Complaint Details
        </h2>

        <a th:href="@{/admin/complaints}"
           class="btn btn-secondary">
            Back to Complaints
        </a>

    </div>

    <div class="card shadow-sm">

        <div class="card-header">

            <h5 class="mb-0">
                Complaint Information
            </h5>

        </div>

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-bordered align-middle">

                    <tr>
                        <th width="30%">Complaint ID</th>
                        <td th:text="${complaint.complaintId}"></td>
                    </tr>

                    <tr>
                        <th>Title</th>
                        <td th:text="${complaint.title}"></td>
                    </tr>

                    <tr>
                        <th>Description</th>
                        <td th:text="${complaint.description}"></td>
                    </tr>

                    <tr>
                        <th>Status</th>

                        <td>

                            <span th:if="${complaint.status.name() == 'OPEN'}"
                                  class="badge status-open">
                                OPEN
                            </span>

                            <span th:if="${complaint.status.name() == 'ASSIGNED'}"
                                  class="badge status-assigned">
                                ASSIGNED
                            </span>

                            <span th:if="${complaint.status.name() == 'IN_PROGRESS'}"
                                  class="badge status-progress">
                                IN PROGRESS
                            </span>

                            <span th:if="${complaint.status.name() == 'RESOLVED'}"
                                  class="badge status-resolved">
                                RESOLVED
                            </span>

                        </td>

                    </tr>

                    <tr>
                        <th>Customer Name</th>
                        <td th:text="${complaint.customer.name}"></td>
                    </tr>

                    <tr>
                        <th>Customer Email</th>
                        <td th:text="${complaint.customer.email}"></td>
                    </tr>

                    <tr>
                        <th>Customer Mobile</th>
                        <td th:text="${complaint.customer.mobile}"></td>
                    </tr>

                    <tr>
                        <th>Created Date</th>
                        <td th:text="${complaint.formattedCreatedDate}"></td>
                    </tr>

                </table>

            </div>

            <div class="mt-4">

                <a th:if="${complaint.status.name() == 'OPEN'}"
                   th:href="@{/admin/complaints/assign/{id}(id=${complaint.complaintId})}"
                   class="btn btn-primary">

                    Assign Complaint

                </a>

                <a th:href="@{/admin/complaints}"
                   class="btn btn-outline-secondary">

                    Back

                </a>

            </div>

        </div>

    </div>

</div>

<div th:replace="~{fragments/footer :: footer}">
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
