<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: header('Assign Complaint')}">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar(true)}">
</div>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2 class="page-title mb-0">
            Assign Complaint
        </h2>

        <a th:href="@{/admin/complaints}"
           class="btn btn-secondary">

            Back to Complaints

        </a>

    </div>

    <div class="card shadow-sm">

        <div class="card-header">

            <h5 class="mb-0">
                Complaint Information
            </h5>

        </div>

        <div class="card-body">

            <div class="table-responsive mb-4">

                <table class="table table-bordered align-middle">

                    <tr>
                        <th width="30%">Complaint ID</th>
                        <td th:text="${complaint.complaintId}">
                        </td>
                    </tr>

                    <tr>
                        <th>Title</th>
                        <td th:text="${complaint.title}">
                        </td>
                    </tr>

                    <tr>
                        <th>Status</th>

                        <td>

                            <span th:if="${complaint.status.name() == 'OPEN'}"
                                  class="badge status-open">
                                OPEN
                            </span>

                            <span th:if="${complaint.status.name() == 'ASSIGNED'}"
                                  class="badge status-assigned">
                                ASSIGNED
                            </span>

                            <span th:if="${complaint.status.name() == 'IN_PROGRESS'}"
                                  class="badge status-progress">
                                IN PROGRESS
                            </span>

                            <span th:if="${complaint.status.name() == 'RESOLVED'}"
                                  class="badge status-resolved">
                                RESOLVED
                            </span>

                        </td>

                    </tr>

                </table>

            </div>

            <form th:action="@{/admin/complaints/assign}"
                  method="post">

                <input type="hidden"
                       name="complaintId"
                       th:value="${complaint.complaintId}">

                <div class="mb-3">

                    <label class="form-label">
                        Select Employee
                    </label>

                    <select name="employeeId"
                            class="form-select"
                            required>

                        <option value="">
                            Select Employee
                        </option>

                        <option th:each="employee : ${employees}"
                                th:value="${employee.userId}"
                                th:text="${employee.name}">
                        </option>

                    </select>

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Remarks
                    </label>

                    <textarea name="remarks"
                              rows="4"
                              class="form-control"
                              placeholder="Enter assignment remarks">
                    </textarea>

                </div>

                <div class="d-flex gap-2">

                    <button type="submit"
                            class="btn btn-primary">

                        Assign Complaint

                    </button>

                    <a th:href="@{/admin/complaints}"
                       class="btn btn-outline-secondary">

                        Cancel

                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

<div th:replace="~{fragments/footer :: footer}">
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
