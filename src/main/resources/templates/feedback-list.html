<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: header('Customer Feedbacks')}">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar(true)}">
</div>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2 class="page-title mb-0">
            Customer Feedbacks
        </h2>

        <a th:href="@{/admin/dashboard}"
           class="btn btn-secondary">
            Dashboard
        </a>

    </div>

    <div class="card shadow-sm">

        <div class="card-header">

            <h5 class="mb-0">
                Feedback Records
            </h5>

        </div>

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead class="table-dark">

                        <tr>

                            <th>Feedback ID</th>
                            <th>Complaint</th>
                            <th>Customer</th>
                            <th>Rating</th>
                            <th>Action</th>

                        </tr>

                    </thead>

                    <tbody>

                        <tr th:if="${#lists.isEmpty(feedbacks)}">

                            <td colspan="5"
                                class="text-center">

                                No feedback records found.

                            </td>

                        </tr>

                        <tr th:each="feedback : ${feedbacks}">

                            <td th:text="${feedback.feedbackId}">
                            </td>

                            <td th:text="${feedback.complaint.title}">
                            </td>

                            <td th:text="${feedback.complaint.customer.name}">
                            </td>

                            <td>

                                <span class="badge bg-warning text-dark">

                                    <span th:text="${feedback.rating}">
                                    </span>/5

                                </span>

                            </td>

                            <td>

                                <a th:href="@{/admin/feedbacks/view/{id}(id=${feedback.feedbackId})}"
                                   class="btn btn-sm btn-primary">

                                    View

                                </a>

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<div th:replace="~{fragments/footer :: footer}">
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
