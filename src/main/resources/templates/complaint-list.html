<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: header('Complaint Management')}">
</head>

<body>

	<div th:replace="~{fragments/navbar :: navbar(true)}"></div>

	<div class="container mt-4">

		<div class="d-flex justify-content-between align-items-center mb-4">

			<h2 class="page-title mb-0">Complaint Management</h2>

			<a th:href="@{/admin/dashboard}" class="btn btn-secondary">

				Dashboard </a>

		</div>

		<!-- Filter Section -->

		<div class="card shadow-sm mb-4">

			<div class="card-body">

				<form th:action="@{/admin/complaints/filter}" method="get">

					<div class="row g-3">

						<div class="col-md-4">

							<select name="status" class="form-select">

								<option value="">All Status</option>

								<option value="OPEN">OPEN</option>

								<option value="ASSIGNED">ASSIGNED</option>

								<option value="IN_PROGRESS">IN PROGRESS</option>

								<option value="RESOLVED">RESOLVED</option>

								<option value="CLOSED">CLOSED</option>

							</select>

						</div>

						<div class="col-md-2">

							<button type="submit" class="btn btn-primary w-100">

								Filter</button>

						</div>

						<div class="col-md-2">

							<a th:href="@{/admin/complaints}"
								class="btn btn-outline-secondary w-100"> Reset </a>

						</div>

					</div>

				</form>

			</div>

		</div>

		<!-- Complaints Table -->

		<div class="card shadow-sm">

			<div class="card-header">

				<h5 class="mb-0">Complaint Records</h5>

			</div>

			<div class="card-body">

				<div class="table-responsive">

					<table class="table table-hover align-middle">

						<thead class="table-dark">

							<tr>

								<th>ID</th>
								<th>Title</th>
								<th>Customer</th>
								<th>Status</th>
								<th>Created Date</th>
								<th>Actions</th>

							</tr>

						</thead>

						<tbody>

							<tr th:if="${#lists.isEmpty(complaints)}">

								<td colspan="6" class="text-center">No Complaints Found</td>

							</tr>

							<tr th:each="complaint : ${complaints}">

								<td th:text="${complaint.complaintId}"></td>

								<td th:text="${complaint.title}"></td>

								<td th:text="${complaint.customer.name}"></td>

								<td><span th:if="${complaint.status.name() == 'OPEN'}"
									class="badge status-open"> OPEN </span> <span
									th:if="${complaint.status.name() == 'ASSIGNED'}"
									class="badge status-assigned"> ASSIGNED </span> <span
									th:if="${complaint.status.name() == 'IN_PROGRESS'}"
									class="badge status-progress"> IN PROGRESS </span> <span
									th:if="${complaint.status.name() == 'RESOLVED'}"
									class="badge status-resolved"> RESOLVED </span> <span
									th:if="${complaint.status.name() == 'CLOSED'}"
									class="badge status-closed"> CLOSED </span></td>

								<td th:text="${complaint.formattedCreatedDate}"></td>

								<td>

									<div class="d-flex gap-2 flex-wrap">

										<a
											th:href="@{/admin/complaints/view/{id}(id=${complaint.complaintId})}"
											class="btn btn-sm btn-primary"> View </a> <a
											th:if="${complaint.status.name() == 'OPEN'}"
											th:href="@{/admin/complaints/assign/{id}(id=${complaint.complaintId})}"
											class="btn btn-sm btn-success"> Assign </a>

									</div>

								</td>

							</tr>

						</tbody>

					</table>

				</div>

			</div>

		</div>


		<!-- Pagination -->

		<nav class="mt-4" th:if="${totalPages != null && totalPages > 0}">

			<ul class="pagination justify-content-center">

				<li th:each="i : ${#numbers.sequence(0,totalPages-1)}"
					class="page-item" th:classappend="${i == currentPage} ? 'active'">

					<a class="page-link" th:href="@{/admin/complaints(pageNo=${i})}"
					th:text="${i+1}"> </a>

				</li>

			</ul>

		</nav>

	</div>

	<div th:replace="~{fragments/footer :: footer}"></div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
